<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 2rem;
    }
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .brand {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .dots {
      display: flex;
      gap: 6px;
    }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      animation: pulse 1s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="loader-wrap" aria-hidden="true" aria-label="Loading">
    <span class="brand">kwdev</span>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
  <script>
    (function() {
      // #region agent log
      try {
        fetch('http://127.0.0.1:7245/ingest/ba92c391-787b-4b76-842e-308edcb0507d', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '8a3da1' }, body: JSON.stringify({ sessionId: '8a3da1', location: 'tauri-load.html', message: 'loader_page_loaded', data: {}, timestamp: Date.now(), hypothesisId: 'H3' }) }).catch(function(){});
      } catch (e) {}
      // #endregion
      var app = 'http://127.0.0.1:4000/';
      var msgEl = document.querySelector('.loader-wrap .brand');
      var dotsEl = document.querySelector('.loader-wrap .dots');
      setTimeout(function() {
        try {
          fetch('http://127.0.0.1:7245/ingest/ba92c391-787b-4b76-842e-308edcb0507d', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '8a3da1' }, body: JSON.stringify({ sessionId: '8a3da1', location: 'tauri-load.html', message: 'loader_redirecting', data: { to: app }, timestamp: Date.now(), hypothesisId: 'H3' }) }).catch(function(){});
        } catch (e) {}
        window.location.href = app;
      }, 1500);
      // If still on loader after 10s, dev server likely not running — show hint
      setTimeout(function() {
        if (document.querySelector('.loader-wrap .brand') && !document.querySelector('.loader-wrap .hint')) {
          var hint = document.createElement('p');
          hint.className = 'hint';
          hint.style.cssText = 'font-size: 0.875rem; opacity: 0.8; max-width: 20rem; text-align: center; margin-top: 0.5rem;';
          hint.textContent = "Can't reach app. Run \"npm run dev\" in a terminal (port 4000), then restart KWDEV.";
          if (dotsEl && dotsEl.parentNode) dotsEl.parentNode.appendChild(hint);
        }
      }, 10000);
    })();
  </script>
</body>
</html>
